<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNS - Registration</title>
    <link rel="stylesheet" href="style-registration.css">
</head>
<body>

    <div class="registration-card">
        <div class="photo-panel">
            <div class="placeholder-icon"></div>
        </div>

        <div class="form-panel">
            <form id="registerForm">
                <h1 class="form-title">Registration</h1>

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" name="fullname" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label>Email Address (@stu.cmb.ac.lk)</label>
                    <input type="email" name="email" placeholder="example@stu.cmb.ac.lk" required>
                </div>

               <div class="input-group">
                    <label>Password (Min. 8 characters)</label>
                    <div class="password-wrapper">
                      <input type="password" id="password" name="password" placeholder="********" minlength="8" required>
                      <span class="toggle-password" id="togglePassword">Show</span>
                   </div>
               </div>

                <div class="input-group">
                    <label>Academic Role</label>
                    <p class="sub-label">Select Your Academic Role</p>
                    <select id="roleSelect" name="role" required>
                        <option value="" disabled selected>Choose a role...</option>
                        <option value="student">Student</option>
                        <option value="lecturer">Lecturer</option>
                        <option value="instructor">Instructor</option>
                        <option value="batch_rep">Batch Rep</option>
                    </select>
                </div>

                <div class="input-group hidden" id="yearGroup">
                    <label>Year</label>
                    <p class="sub-label">If You're a Student, Select the Year</p>
                    <select id="yearId" name="year_id">
                        <option value="" disabled selected">Select Year</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>

                <button type="submit" class="register-btn">Register</button>
            </form>
        </div>
    </div>

    <script>
        // Logic to show Year dropdown only for Student or Batch Rep
        const roleSelect = document.getElementById('roleSelect');
        const yearGroup = document.getElementById('yearGroup');
        const yearId = document.getElementById('yearId');

        roleSelect.addEventListener('change', function() {
            if (this.value === 'student' || this.value === 'batch_rep') {
                yearGroup.classList.remove('hidden');
                yearId.required = true;
            } else {
                yearGroup.classList.add('hidden');
                yearId.required = false;
            }
        });
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');

        togglePassword.addEventListener('click', function () {
    // Toggle the type attribute
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
    
    // Toggle the text of the button
           this.textContent = type === 'password' ? 'Show' : 'Hide';
       });
    </script>
</body>
</html>
